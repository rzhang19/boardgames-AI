name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          for f in .env .env.staging; do
            if [ -f "$f" ]; then
              echo "::error::$f is tracked - remove it and ensure it is in .gitignore"
              exit 1
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SEED_USER_PASSWORD: seedpassword1

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Configure git authentication
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      - name: Configure git safe directory
        run: git config --global --add safe.directory /opt/boardgames

      - name: Deploy to production
        run: cd ${{ vars.PROJECT_DIR || '/opt/boardgames' }} && bash scripts/deploy.sh production
