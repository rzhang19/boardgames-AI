services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boardgameclub}
      POSTGRES_USER: ${POSTGRES_USER:-boardgameclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 8000), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  staging-db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-boardgameclub_staging}
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-boardgameclub}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set in .env.staging}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  staging-web:
    build: .
    env_file:
      - .env.staging
    depends_on:
      staging-db:
        condition: service_started
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 8000), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-tester}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/app/media
    depends_on:
      web:
        condition: service_healthy
      staging-web:
        condition: service_healthy
    restart: unless-stopped

  runner:
    image: myoung34/github-runner:latest
    env_file:
      - .env
    environment:
      REPO_URL: ${GITHUB_REPO_URL}
      RUNNER_NAME: ${RUNNER_NAME:-boardgames-runner}
      RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN}
      RUNNER_WORKDIR: /home/runner/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:${PROJECT_DIR:-/opt/boardgames}
      - runner_data:/home/runner
    restart: unless-stopped

  telegram:
    build: ./telegram_bot
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      PROJECT_DIR: ${PROJECT_DIR:-/opt/boardgames}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:${PROJECT_DIR:-/opt/boardgames}
    restart: unless-stopped

volumes:
  postgres_data:
  staging_postgres_data:
  caddy_data:
  caddy_config:
  runner_data:
  media_data:
