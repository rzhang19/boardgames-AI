services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boardgameclub}
      POSTGRES_USER: ${POSTGRES_USER:-boardgameclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  staging-db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-boardgameclub_staging}
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-boardgameclub}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:-changeme}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  staging-web:
    build: .
    env_file:
      - .env.staging
    depends_on:
      - staging-db
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-tester}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - staging-web
    restart: unless-stopped

volumes:
  postgres_data:
  staging_postgres_data:
  caddy_data:
  caddy_config:
