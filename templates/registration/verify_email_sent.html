{% extends "base.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<div class="card">
    <h1>Check Your Email</h1>
    <p>We've sent a verification link to <strong>{{ email }}</strong>. Please click the link to verify your account.</p>
    <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
</div>
{% endblock %}
