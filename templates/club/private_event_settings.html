{% extends "base.html" %}

{% block title %}Event Settings - {{ event.title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>Event Settings: {{ event.title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <a href="{% url 'private_event_detail' event.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
