{% extends "base.html" %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Add User</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Add User</button>
            <a href="{% url 'manage_users' %}" class="btn btn-neutral">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
