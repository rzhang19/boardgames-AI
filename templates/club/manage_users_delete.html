{% extends "base.html" %}

{% block title %}Delete User{% endblock %}

{% block content %}
<div class="card">
    <h1>Delete {{ target_user.username }}</h1>

    <p>Are you sure you want to delete user "{{ target_user.username }}"? This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'manage_users' %}" class="btn btn-neutral">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
